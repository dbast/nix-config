name: "CI"
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Inspect
        run: |
          lscpu
          df -h
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
      - run: |
          make check
      - run: |
          nix fmt -- --ci
  test:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Inspect
        run: |
          lscpu
          df -h
      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          enable_kvm: true
          extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"
      - uses: cachix/cachix-action@v17
        with:
          name: ts433
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build qnas system
        run: |
          nix build .#nixosConfigurations.qnas.config.system.build.toplevel -o result-current
      - name: Build base system for comparison
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p /tmp/nix-config-main
          git archive origin/main | tar -x -C /tmp/nix-config-main
          nix build /tmp/nix-config-main#nixosConfigurations.qnas.config.system.build.toplevel -o result-main
      - name: Generate closure diff with dix
        id: dix
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "diff<<EOF"
            nix run .#dix result-main result-current 2>/dev/null || echo "Error: dix command failed"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"
      - name: Collect flake input timestamps
        id: flake-input-dates
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "dates<<EOF"
            echo '| Input | Epoch | ISO UTC |'
            echo '| --- | ---: | --- |'
            jq -r '.nodes | to_entries[] | select(.value.locked.lastModified != null) | "\(.key)\t\(.value.locked.lastModified)"' flake.lock | while IFS=$'\t' read -r key ts; do
              printf '| %s | %s | %s |\n' "$key" "$ts" "$(date -u -d "@$ts" +"%Y-%m-%dT%H:%M:%SZ")"
            done
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"
      - name: Post dix diff to PR
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ## NixOS Closure Changes

            ```
            ${{ steps.dix.outputs.diff }}
            ```

            ## Flake Input Timestamps

            ${{ steps.flake-input-dates.outputs.dates }}
          comment-tag: dix-diff
      - name: Run integration tests
        run: |
          make test-qnas
