name: "CI"
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Inspect
        run: |
          lscpu
          df -h
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
      - run: |
          make check
      - run: |
          nix fmt -- --ci
  test:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Inspect
        run: |
          lscpu
          df -h
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7
        with:
          enable_kvm: true
          extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ts433
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build qnas system
        run: |
          nix build .#nixosConfigurations.qnas.config.system.build.toplevel -o result-current
      - name: Build base system for comparison
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p /tmp/nix-config-main
          git archive origin/main | tar -x -C /tmp/nix-config-main
          nix build /tmp/nix-config-main#nixosConfigurations.qnas.config.system.build.toplevel -o result-main
      - name: Generate closure diff with dix
        id: dix
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "diff<<EOF"
            nix run .#dix result-main result-current 2>/dev/null || echo "Error: dix command failed"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"
      - name: Collect flake input timestamps
        id: flake-input-dates
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "dates<<EOF"
            echo '| Input | Epoch | ISO UTC |'
            echo '| --- | ---: | --- |'
            jq -r '.nodes | to_entries[] | select(.value.locked.lastModified != null) | "\(.key)\t\(.value.locked.lastModified)"' flake.lock | while IFS=$'\t' read -r key ts; do
              printf '| %s | %s | %s |\n' "$key" "$ts" "$(date -u -d "@$ts" +"%Y-%m-%dT%H:%M:%SZ")"
            done
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"
      - name: Post dix diff to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DIX_DIFF: ${{ steps.dix.outputs.diff }}
          FLAKE_INPUT_DATES: ${{ steps.flake-input-dates.outputs.dates }}
        with:
          script: |
            const marker = '<!-- dix-diff -->';
            const body = [
              marker,
              '## NixOS Closure Changes',
              '',
              '```',
              process.env.DIX_DIFF ?? '',
              '```',
              '',
              '## Flake Input Timestamps',
              '',
              process.env.FLAKE_INPUT_DATES ?? '',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
      - name: Run integration tests
        run: |
          make test-qnas
